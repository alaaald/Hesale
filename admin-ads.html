<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>الإعلانات - HeSale</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar"></aside>
    <main class="admin-main">
      <div class="admin-header"><div><button class="admin-menu-toggle">☰</button><h1>إدارة الإعلانات</h1></div></div>
      <div class="admin-card"><div class="admin-card-body table-responsive">
        <table class="admin-table"><thead><tr><th>Slot</th><th>النوع</th><th>الموقع</th><th>الأبعاد</th><th>الحالة</th><th>إجراءات</th></tr></thead><tbody id="adsTableBody"></tbody></table>
      </div></div>
    </main>
  </div>
  <div class="modal" id="adModal"><div class="modal-content">
    <div class="modal-header"><h3>تعديل إعلان</h3><button class="modal-close" onclick="document.getElementById('adModal').classList.remove('show')">&times;</button></div>
    <div class="modal-body">
      <input type="hidden" id="editAdId">
      <div class="form-group"><label>النوع</label><select id="editAdType" class="form-control"><option value="custom-html">HTML مخصص</option><option value="google-adsense">Google AdSense</option></select></div>
      <div class="form-group"><label>الموقع</label><select id="editAdPlacement" class="form-control"><option value="sidebar">Sidebar</option><option value="in-post">In-Post</option><option value="header">Header</option><option value="footer">Footer</option></select></div>
      <div class="form-row"><div class="form-group"><label>العرض</label><input id="editAdWidth" class="form-control"></div><div class="form-group"><label>الارتفاع</label><input id="editAdHeight" class="form-control"></div></div>
      <div class="form-group"><label>الكود</label><textarea id="editAdCode" class="form-control" rows="8"></textarea></div>
    </div>
    <div class="modal-footer"><button class="btn btn-primary" onclick="AdsAdmin.save()">حفظ</button><button class="btn btn-secondary" onclick="AdsAdmin.preview(document.getElementById('editAdId').value)">معاينة</button></div>
  </div></div>
  <div class="modal" id="adPreviewModal"><div class="modal-content"><div class="modal-header"><h3>معاينة</h3><button class="modal-close" onclick="document.getElementById('adPreviewModal').classList.remove('show')">&times;</button></div><div class="modal-body" id="adPreviewArea"></div></div></div>
  <script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="cloud-db.js"></script>
  <script src="script.js"></script>
  <script src="analytics.js"></script>
  <script src="admin.js"></script>
  <script>document.addEventListener('DOMContentLoaded',async()=>{await initializeData();if(!Auth.requireAuth())return;AdminUI.init('ads');AdsAdmin.renderTable();});</script>
</body>
</html>
