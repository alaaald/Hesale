<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>الإحصائيات - HeSale</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar"></aside>
    <main class="admin-main">
      <div class="admin-header"><div><button class="admin-menu-toggle">☰</button><h1>الإحصائيات</h1></div></div>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-icon">👁</div><div><h3 id="totalViews">0</h3><p>إجمالي الزيارات</p></div></div>
        <div class="stat-card"><div class="stat-icon">📊</div><div><h3 id="avgDaily">0</h3><p>متوسط يومي</p></div></div>
        <div class="stat-card"><div class="stat-icon">📈</div><div><h3 id="topDay">-</h3><p>أعلى يوم</p></div></div>
        <div class="stat-card"><div class="stat-icon">↩️</div><div><h3 id="bounceRate">42%</h3><p>نسبة الارتداد</p></div></div>
      </div>
      <div class="admin-card"><div class="admin-card-header"><h2>الزيارات اليومية (30 يوم)</h2></div><div class="admin-card-body"><div class="chart-wrap"><canvas id="dailyChart"></canvas></div></div></div>
      <div class="admin-card"><div class="admin-card-header"><h2>الزيارات الشهرية</h2></div><div class="admin-card-body"><div class="chart-wrap"><canvas id="monthlyChart"></canvas></div></div></div>
      <div class="settings-grid">
        <div class="admin-card"><div class="admin-card-header"><h2>أكثر المقالات</h2></div><div class="admin-card-body"><ul class="ranked-list" id="topPostsAdmin"></ul></div></div>
        <div class="admin-card"><div class="admin-card-header"><h2>أكثر الفئات</h2></div><div class="admin-card-body"><ul class="ranked-list" id="topCats"></ul></div></div>
      </div>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="cloud-db.js"></script>
  <script src="script.js"></script>
  <script src="analytics.js"></script>
  <script src="admin.js"></script>
  <script>document.addEventListener('DOMContentLoaded',async()=>{await initializeData();if(!Auth.requireAuth())return;AdminUI.init('analytics');AnalyticsAdmin.render();});</script>
</body>
</html>
